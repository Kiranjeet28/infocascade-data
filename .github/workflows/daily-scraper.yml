name: Daily Timetable Scraper

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-timetable-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Run timetable scraper
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: node

      - name: Install dependencies
        run: npm install

      - name: Run timetable scraper
        run: |
          echo "::group::Running scrapers/runAllTimetables.js"
          node scrapers/runAllTimetables.js
          echo "::endgroup::"

      - name: Detect generated JSON changes
        id: changes
        shell: bash
        run: |
          echo "::group::Changed generated JSON files"
          git status --short -- public web data
          echo "::endgroup::"

          git ls-files --modified --others --deleted --exclude-standard public web data \
            | grep -E '\.json$' \
            | xargs -r git add --

          if git diff --cached --quiet; then
            echo "No generated JSON changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Generated JSON changes detected:"
            git diff --cached --name-status
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated JSON
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update timetable data"
          git push origin HEAD:main
